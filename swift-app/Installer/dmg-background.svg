<svg width="540" height="380" viewBox="0 0 540 380" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0d0d1a"/>
      <stop offset="100%" stop-color="#080810"/>
    </radialGradient>
    <radialGradient id="blob1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7050FF" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#7050FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blob2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00B4FF" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#00B4FF" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="540" height="380" fill="url(#bg)"/>
  <!-- Subtle mesh blobs -->
  <ellipse cx="120" cy="80"  rx="220" ry="200" fill="url(#blob1)"/>
  <ellipse cx="440" cy="60"  rx="180" ry="160" fill="url(#blob2)"/>
  <!-- Arrow hint -->
  <line x1="230" y1="190" x2="310" y2="190" stroke="#c8f060" stroke-width="1.5" stroke-opacity="0.4"
        marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#c8f060" fill-opacity="0.4"/>
    </marker>
  </defs>
  <!-- "Applications" label area hint -->
  <text x="400" y="330" font-family="-apple-system, sans-serif" font-size="11"
        fill="#ffffff" fill-opacity="0.2" text-anchor="middle">Applications</text>
  <text x="140" y="330" font-family="-apple-system, sans-serif" font-size="11"
        fill="#ffffff" fill-opacity="0.2" text-anchor="middle">App Scheduler</text>
</svg>
