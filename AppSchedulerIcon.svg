<svg viewBox="0 0 1024 1024" width="1024" height="1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="b1" cx="30%" cy="25%" r="70%">
      <stop offset="0%" stop-color="#7050FF" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#080810" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="b2" cx="80%" cy="15%" r="60%">
      <stop offset="0%" stop-color="#00B4FF" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#080810" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="b3" cx="50%" cy="95%" r="55%">
      <stop offset="0%" stop-color="#FF6478" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#080810" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c8f060" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#c8f060" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="glass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.20)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.05)"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="38"/>
    </filter>
    <filter id="sg">
      <feGaussianBlur stdDeviation="18" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="rounded">
      <rect width="1024" height="1024" rx="220" ry="220"/>
    </clipPath>
  </defs>

  <g clip-path="url(#rounded)">
    <!-- base -->
    <rect width="1024" height="1024" fill="#080810"/>
    <!-- mesh -->
    <rect width="1024" height="1024" fill="url(#b1)"/>
    <rect width="1024" height="1024" fill="url(#b2)"/>
    <rect width="1024" height="1024" fill="url(#b3)"/>

    <!-- glow bloom behind disc -->
    <circle cx="512" cy="512" r="308" fill="url(#glow)" filter="url(#blur)"/>

    <!-- glass disc -->
    <circle cx="512" cy="512" r="294" fill="url(#glass)"/>
    <circle cx="512" cy="512" r="294" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="6"/>

    <!-- specular highlight -->
    <ellipse cx="460" cy="370" rx="128" ry="64" fill="rgba(255,255,255,0.12)" transform="rotate(-20,460,370)"/>

    <!-- cardinal tick marks -->
    <g stroke="rgba(255,255,255,0.22)" stroke-width="10" stroke-linecap="round">
      <line x1="512" y1="242" x2="512" y2="280"/>
      <line x1="512" y1="744" x2="512" y2="782"/>
      <line x1="242" y1="512" x2="280" y2="512"/>
      <line x1="744" y1="512" x2="782" y2="512"/>
    </g>

    <!-- hour hand — white, pointing ~10 o'clock -->
    <line x1="512" y1="512" x2="434" y2="382"
      stroke="rgba(235,238,245,0.95)" stroke-width="22"
      stroke-linecap="round" filter="url(#sg)"/>

    <!-- minute hand — accent green, pointing ~12:20 -->
    <line x1="512" y1="512" x2="614" y2="350"
      stroke="#c8f060" stroke-width="18"
      stroke-linecap="round" filter="url(#sg)"/>

    <!-- center cap -->
    <circle cx="512" cy="512" r="28" fill="#c8f060" filter="url(#sg)"/>
    <circle cx="512" cy="512" r="16" fill="white"/>
  </g>

  <!-- outer rim -->
  <rect x="1" y="1" width="1022" height="1022" rx="219" ry="219"
    fill="none" stroke="rgba(255,255,255,0.14)" stroke-width="2"/>
</svg>
